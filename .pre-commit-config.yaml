repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict]
        exclude: ^(legacy/|tests/|compare_spell_durations\.py)
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - sqlmodel>=0.0.24
          - loguru>=0.7.0
          - typer>=0.12.0
          - rich>=13.0.0
          - types-pillow
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/unit/registry tests/unit/infrastructure --no-cov -k "not test_setup_with_debug_level"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
