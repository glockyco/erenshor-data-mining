repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict]
        exclude: ^(legacy/|tests/|compare_spell_durations\.py)
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - sqlmodel>=0.0.24
          - loguru>=0.7.0
          - types-pillow
