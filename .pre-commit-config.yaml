repos:
  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^tests/golden/
      - id: end-of-file-fixer
        exclude: ^tests/golden/
      - id: check-yaml
      - id: check-json
        exclude: ^(\.vscode/|src/maps/tsconfig\.json)
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^tests/golden/

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src/|tests/)
      - id: ruff-format
        files: ^(src/|tests/)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        exclude: ^(legacy/|tests/|compare_spell_durations\.py)
        require_serial: true
        pass_filenames: false
        args: [src/]
      - id: pytest-unit
        name: pytest (unit)
        entry: uv run pytest tests/unit -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types: [python]
      - id: pytest-integration
        name: pytest (integration)
        entry: uv run pytest tests/integration -v
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Maps (SvelteKit)
  - repo: local
    hooks:
      - id: lint-staged-maps
        name: lint-staged (maps)
        entry: pnpm --filter erenshor-maps exec lint-staged
        language: system
        pass_filenames: false
        files: ^src/maps/

  # C# (mod)
  - repo: local
    hooks:
      - id: csharpier
        name: csharpier
        entry: bash -c 'cd src/mods/InteractiveMapCompanion && dotnet tool restore --verbosity quiet && dotnet csharpier .'
        language: system
        files: ^src/mods/.*\.cs$
        pass_filenames: false

  # Security
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
