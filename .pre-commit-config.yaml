repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src/|tests/)
      - id: ruff-format
        files: ^(src/|tests/)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        exclude: ^(legacy/|tests/|compare_spell_durations\.py)
        require_serial: true
        pass_filenames: false
        args: [src/]
  - repo: local
    hooks:
      - id: lint-staged-maps
        name: lint-staged (maps)
        entry: pnpm --filter erenshor-maps exec lint-staged
        language: system
        pass_filenames: false
        files: ^src/maps/
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
