# Manual graph edges for scripted / non-inferable unlocks.
# These are direct content unlocks, not generic reachability analysis.
#
# Group semantics: edges sharing the same `group` on the same target are
# AND'd (all must be satisfied); different groups on the same target are
# OR'd (any satisfied group unlocks).  Edges with no group are
# unconditional prerequisites that must always be satisfied.

# ── Stowaway's Step ─────────────────────────────────────────────────────

# Stowaway Step Lighthouse Key door blocks the Tutorial lighthouse zone line
# and the Occuphage character (Lighthouse Demon) behind it.
[[edges]]
source = "door:stowaway:799.94:21.48:587.86"
target = "zoneline:stowaway:tutorial:808.08:14.08:592.64"
type = "unlocks_zone_line"

[[edges]]
source = "door:stowaway:799.94:21.48:587.86"
target = "character:lighthouse demon:tutorial:-64.96:22.26:149.12"
type = "unlocks_character"
note = "Occuphage in Island Tomb requires the lighthouse key to reach"

# Crypt Key door blocks the Shivering Step zone line (Halloween Event).
[[edges]]
source = "door:stowaway:592.34:41.00:671.24"
target = "zoneline:stowaway:shiveringstep:592.39:41.07:672.77"
type = "unlocks_zone_line"
note = "Shivering Key (Halloween Event) required for this zone transition"

