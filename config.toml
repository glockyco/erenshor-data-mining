# Erenshor Data Mining Pipeline Configuration
#
# This configuration file is used by both Bash CLI and Python services
# Supports multiple game variants with separate databases

version = "0.3"

# Default variant when --variant flag is not specified
default_variant = "main"

# ============================================================================
# GLOBAL PATHS (used by both Bash and Python)
# ============================================================================
[global.paths]
# Project-wide paths
state = "$REPO_ROOT/.erenshor/state.json"
config_local = "$REPO_ROOT/.erenshor/config.local.toml"
logs = "$REPO_ROOT/.erenshor/logs"
wiki_output = "$REPO_ROOT/out/wiki"        # Wiki pages output (Python)
json_export = "$REPO_ROOT/out/json"        # JSON export output (Python)
csv_export = "$REPO_ROOT/out/csv"          # CSV export output (Python)
reports = "$REPO_ROOT/out/reports"         # Operation reports (Python)

# ============================================================================
# BASH CLI CONFIGURATION
# ============================================================================
[global.steam]
# Steam username (set in config.local.toml or .env for privacy)
username = ""
platform = "windows"                       # Force Windows version for macOS users

[global.unity]
# Unity configuration
version = "2021.3.45f2"
path = "/Applications/Unity/Hub/Editor/2021.3.45f2/Unity.app/Contents/MacOS/Unity"
timeout = 3600                             # 60 minutes

[global.assetripper]
# AssetRipper configuration
path = "$HOME/Projects/AssetRipper/AssetRipper.GUI.Free"
port = 8080
timeout = 3600                             # 60 minutes

# ============================================================================
# PYTHON CONFIGURATION
# ============================================================================
[global.database]
# Database settings (used by both Bash and Python)
backup_enabled = true
validate = true

[global.mediawiki]
# MediaWiki API configuration (Python)
api_url = "https://erenshor.wiki.gg/api.php"
api_batch_size = 25                        # Number of pages to fetch per API request (1-50)
api_delay = 1.0                            # Delay in seconds between API requests
upload_batch_size = 10                     # Maximum pages to upload in one batch
upload_delay = 1.0                         # Delay in seconds between uploads
upload_edit_summary = "Automated wiki update"
upload_minor_edit = true

# Bot credentials (loaded from .env or config.local.toml)
bot_username = ""                          # MediaWiki bot username (from Special:BotPasswords)
bot_password = ""                          # MediaWiki bot password (from Special:BotPasswords)

[global.google_sheets]
# Google Sheets API configuration (Python)
credentials_file = "$HOME/.config/erenshor/google-credentials.json"

# Behavior
batch_size = 1000                          # Rows to upload per batch
max_retries = 3                            # Retry failed operations
retry_delay = 5                            # Seconds between retries

# ============================================================================
# SHARED BEHAVIOR SETTINGS
# ============================================================================
[global.behavior]
# Behavioral settings
auto_backup = true
confirm_destructive = true
parallel_downloads = true
max_retries = 3
retry_delay = 30

[global.logging]
# Logging configuration
level = "info"                             # debug, info, warn, error
file_enabled = true
console_enabled = true

# ============================================================================
# VARIANT: MAIN (Public Release)
# ============================================================================

[variants.main]
enabled = true
name = "Main Game"
description = "Production release version"

# Steam App ID
app_id = "2382520"

# Paths (use $REPO_ROOT for portability)
unity_project = "$REPO_ROOT/variants/main/unity"
editor_scripts = "$REPO_ROOT/src/Assets/Editor"
game_files = "$REPO_ROOT/variants/main/game"
output = "$REPO_ROOT/variants/main/output"
database = "$REPO_ROOT/variants/main/erenshor-main.sqlite"

# Logs and backups
logs = "$REPO_ROOT/variants/main/logs"
backups = "$REPO_ROOT/variants/main/backups"

# Google Sheets configuration (Python)
[variants.main.google_sheets]
spreadsheet_id = "1eOYfjaudAhvE6HGBtWyRGgQDsmWDLENaoEwRvgBO_0E"

# ============================================================================
# VARIANT: PLAYTEST (Private Beta/Alpha)
# ============================================================================

[variants.playtest]
enabled = false                            # Disable by default, enable in config.local.toml
name = "Playtest (Beta/Alpha)"
description = "Private beta testing version (requires Steam beta access)"

# Steam App ID for playtest
app_id = "3090030"

# Paths
unity_project = "$REPO_ROOT/variants/playtest/unity"
editor_scripts = "$REPO_ROOT/src/Assets/Editor"
game_files = "$REPO_ROOT/variants/playtest/game"
output = "$REPO_ROOT/variants/playtest/output"
database = "$REPO_ROOT/variants/playtest/erenshor-playtest.sqlite"

# Logs and backups
logs = "$REPO_ROOT/variants/playtest/logs"
backups = "$REPO_ROOT/variants/playtest/backups"

# Google Sheets configuration (Python)
[variants.playtest.google_sheets]
spreadsheet_id = "1gRgoCSXVRcbAbLNa7_FD5CMN9Z0PQA-mInSLeW1cRGE"

# ============================================================================
# VARIANT: DEMO (Public Demo)
# ============================================================================

[variants.demo]
enabled = false                            # Disable by default
name = "Demo"
description = "Public demo version (limited content)"

# Steam App ID for demo
app_id = "2522260"

# Paths
unity_project = "$REPO_ROOT/variants/demo/unity"
editor_scripts = "$REPO_ROOT/src/Assets/Editor"
game_files = "$REPO_ROOT/variants/demo/game"
output = "$REPO_ROOT/variants/demo/output"
database = "$REPO_ROOT/variants/demo/erenshor-demo.sqlite"

# Logs and backups
logs = "$REPO_ROOT/variants/demo/logs"
backups = "$REPO_ROOT/variants/demo/backups"

# ============================================================================
# CUSTOM VARIANTS (Example)
# ============================================================================
# Add your own variants as needed:
#
# [variants.custom]
# enabled = false
# name = "Custom Build"
# app_id = "1234567"
# unity_project = "$REPO_ROOT/variants/custom/unity"
# editor_scripts = "$REPO_ROOT/src/Assets/Editor"
# database = "$REPO_ROOT/variants/custom/erenshor-custom.sqlite"

# ============================================================================
# NOTES
# ============================================================================
#
# Directory Structure:
#   ~/Projects/erenshor/
#   ├── .erenshor/              # Project-local state (NOT tracked)
#   │   ├── state.json          # Pipeline state
#   │   ├── config.local.toml   # Local overrides
#   │   └── logs/               # Global logs
#   ├── cli/                    # Bash CLI scripts (tracked)
#   ├── src/
#   │   ├── Assets/Editor/      # Unity export scripts (tracked, source of truth)
#   │   └── erenshor/           # Python package (tracked)
#   ├── out/                    # Python outputs (NOT tracked)
#   │   ├── wiki/               # Generated wiki pages
#   │   ├── json/               # JSON exports
#   │   ├── csv/                # CSV exports
#   │   └── reports/            # Operation reports
#   ├── variants/               # All variant data (NOT tracked)
#   │   ├── main/
#   │   │   ├── game/           # Game files (~9GB)
#   │   │   ├── unity/          # Unity project
#   │   │   │   └── Assets/Editor -> ../../../../src/Assets/Editor/  # Symlink
#   │   │   ├── logs/           # Variant-specific logs
#   │   │   ├── backups/        # Database backups
#   │   │   └── erenshor-main.sqlite
#   │   ├── playtest/
#   │   └── demo/
#   ├── config.toml             # This file (tracked)
#   ├── .env                    # Environment variables (NOT tracked)
#   └── .env.example            # Example environment variables (tracked)
#
# Configuration Loading (Priority Order):
#   1. Environment variables (ERENSHOR_* prefix)
#   2. .env file (gitignored, for local secrets)
#   3. config.local.toml (gitignored, for local overrides)
#   4. config.toml (tracked, project defaults)
#
# Local Configuration:
#   Option 1: Create config.local.toml for TOML-based overrides:
#
#   [global.steam]
#   username = "yourusername"
#
#   [global.mediawiki]
#   bot_username = "YourBot@WikiJob"
#   bot_password = "your_bot_password"
#
#   [variants.playtest]
#   enabled = true
#
#   Option 2: Create .env file for environment variable overrides:
#
#   ERENSHOR_STEAM_USERNAME=yourusername
#   ERENSHOR_BOT_USERNAME=YourBot@WikiJob
#   ERENSHOR_BOT_PASSWORD=your_bot_password
#   ERENSHOR_VARIANTS_PLAYTEST_ENABLED=true
#
#   Both files are NOT tracked in Git and override config.toml
#
# Path Expansion:
#   - $REPO_ROOT = Repository root (auto-detected from Git)
#   - $HOME = User's home directory
#   - ~ = User's home directory
#
# Bash CLI Usage:
#   # Default variant (main)
#   erenshor download
#   erenshor export
#
#   # Specific variant
#   erenshor download --variant playtest
#   erenshor export --variant demo
#
#   # All enabled variants
#   erenshor status --all-variants
#   erenshor update --all-variants
#
# Python CLI Usage:
#   # Generate wiki pages
#   erenshor-wiki generate items --variant main
#
#   # Deploy to MediaWiki
#   erenshor-wiki deploy wiki --variant main
#
#   # Deploy to Google Sheets
#   erenshor-wiki deploy sheets --variant main
#
# Symlink Management:
#   erenshor symlink check          # Verify all symlinks
#   erenshor symlink create         # Create missing symlinks
#   erenshor symlink repair         # Fix broken symlinks
#   erenshor symlink status         # Show symlink details
